<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWave</title>

    <!-- Google Font Tag -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<!-- Stylesheet Tag -->
<link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwind CSS Connect -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS File Connect Link -->
    <link rel="stylesheet" href="Styles/style.css">
    
</head>
<body class="bg-[#1a0b2e]" text-base>
    <header class="border-b border-[#412567]">
        <nav
        class="flex items-center justify-between text-white py-[18px] container mx-auto px-[20px]"
      >
        <div class="brand-logo text-[20px] lg:text-[30px]">
          <a href="#" class="font-black">Tech<span
              class="bg-linear-to-t from-[#F7E93F] via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent"
              >Wave</span>
        </a>
        </div>
        <ul class="lg:gap-[32px] hidden lg:flex">
          <li>
            <a href="#">About</a>
          </li>
          <li>
            <a href="#">Episodes</a>
          </li>
          <li>
            <a href="#">Host</a>
          </li>
        </ul>
        <button
          class="hidden lg:block btn rounded-full py-[12px] px-[20px] font-semibold bg-linear-to-tr from-[#F7E93F] via-[#FB09B4] to-[#9100F8]"
        >
          Subscribe <i class="fa-solid fa-arrow-right"></i>
        </button>

        <button class="mob-btn text-[18px] block lg:hidden">
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>

    </header>

    <main class="flex flex-col gap-[50px]">
        <!-- hero section -->
      <section
        id="hero"
        class="bg-position-[center_top_20%] md:bg-position-[center_top_5%] lg:bg-center"
      >
        <div
          class="mx-auto flex flex-col items-center justify-center container mx-auto px-[20px] py-[40px] lg:py-[100px]"
        >
          <div
            class="relative size-[190px] lg:size-[350px] flex items-center justify-center mb-[24px] lg:mb-[40px] group"
          >
            <img class="absolute z-0" src="./assets/hero-circle.png" alt="Background Circle" />
            <img
              class="h-[70px] lg:h-[175px] w-auto z-1 group-hover:animate-spin delay-200"
              src="./assets/microphone.png"
              alt="Microphone"
            />
            <span
              class="absolute bg-[#00FF88] text-[16px] py-[8px] px-[16px] rounded-full top-0 right-0 lg:right-[25px] font-semibold text-[#1A0B2E]"
              >New</span
            >
          </div>
          <div class="text-center text-white">
            <h1 class="font-black text-[40px] lg:text-[60px] mb-[8px]">
              TechWave
            </h1>
            <p class="text-[16px]">
              Your daily dose of tech insights, productivity hacks, and personal
              growth
            </p>
            <div class="flex gap-2 justify-center mt-[24px]">
              <button
                class="btn rounded-full py-[12px] px-[20px] font-semibold bg-linear-to-tr from-[#F7E93F] via-[#FB09B4] to-[#9100F8] cursor-pointer hover:bg-clip-text hover:text-transparent transition-all border border-[#9100F8] flex items-center justify-center gap-2"
              >
                <img src="assets/spotify.png" alt="Spotify" /> Listen on
                Spotify
              </button>
              <button
                class="btn rounded-full py-[12px] px-[20px] font-semibold border border-[#00FF88] text-[#00FF88] hover:text-[#1A0B2E] hover:bg-[#00FF88] cursor-pointer transition-all box-border flex items-center justify-center gap-2 group"
              >
                <img
                  src="assets/message.png"
                  class="group-hover:grayscale group-hover:brightness-0"
                  alt="Subscribe"
                />
                Subscribe
              </button>
            </div>
          </div>
        </div>
      </section>

    </main>

    <footer>

    </footer>
    
</body>
</html>
